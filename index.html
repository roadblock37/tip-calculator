<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <!-- link to google font Space Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <!-- link to CSS files with mobile breakpoint at 375px and desktop at 1440px -->
  <link rel="stylesheet" type="text/css" href="./CSS/index.css" media and screen (min-width: 375px)>
  
  <title>Frontend Mentor | Tip calculator app</title>

</head>
<body>
  <img src="./images/logo.svg" alt="logo" class="logo">
  <section class="calculator">
    <p class="bill">Bill</p>
    <input type="text" placeholder="0" id="billInput">

    <p class="tipLabel">Select Tip %</p>
    <div class="tipButtonsGrid">
      <button id="_5Button">5%</button>
      <button id="_10Button">10%</button>
      <button id="_15Button">15%</button>
      <button id="_25Button">25%</button>
      <button id="_50Button">50%</button>
      <button id="customButton">Custom</button>
    </div>

    <p class="peopleLabel">Number of People</p>
    <input type="text" placeholder="0" id="peopleInput">

    <div class="totalAmountGrid">
      <p> Tip Amount
        / person
      </p>
      <textarea placeholder="$0.00" id="tipPerPerson"></textarea> 
      <p>Total
        / person
      </p>
      <textarea placeholder="$0.00" id="totalPerPerson"></textarea>
      <button id="resetButton">Reset</button>
    </div>
    

  
  
  
  
  
  
  

  

 

  

  
  </section>

</body>
</html>
